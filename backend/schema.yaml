          description: ''
  /api/auth/superadmin/demote/{id}/:
    put:
      operationId: auth_superadmin_demote_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoteUserResponse'
          description: ''
  /api/auth/superadmin/promote/{id}/:
    put:
      operationId: auth_superadmin_promote_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - auth
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteUserResponse'
          description: ''
  /api/fpl/bootstrap/:
    get:
      operationId: fpl_bootstrap_retrieve
      parameters:
      - in: query
        name: force_refresh
        schema:
          type: string
        description: Set to 1 to bypass cache.
      tags:
      - fpl
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/fpl/fixtures/:
    get:
      operationId: fpl_fixtures_retrieve
      parameters:
      - in: query
        name: force_refresh
        schema:
          type: string
        description: Set to 1 to bypass cache.
      - in: query
        name: gw
        schema:
          type: integer
        description: Optional gameweek filter.
      tags:
      - fpl
      security:
      - jwtAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/predictions/captaincy/:
