              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/predictions/fdr/:
    get:
      operationId: predictions_fdr_retrieve
      parameters:
      - in: query
        name: horizon
        schema:
          type: integer
      - in: query
        name: team_id
        schema:
          type: integer
        required: true
      tags:
      - predictions
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/predictions/match/:
    post:
      operationId: predictions_match_create
      tags:
      - predictions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/MatchRequest'
          multipart/form-data:
            schema:
