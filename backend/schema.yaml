      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DemoteUserResponse'
          description: ''
  /api/superadmin/promote/{id}/:
    put:
      operationId: superadmin_promote_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - superadmin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoteUserResponse'
          description: ''
components:
  schemas:
    ChangePasswordRequest:
      type: object
      properties:
        current_password:
          type: string
        new_password:
          type: string
        confirm_password:
          type: string
      required:
      - confirm_password
      - current_password
      - new_password
    ChangePasswordResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    DeleteUserResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    DemoteUserResponse:
      type: object
      properties:
        message:
          type: string
        id:
          type: integer
        username:
          type: string
        role:
          type: string
      required:
      - id
      - message
      - role
      - username
    ForgotPasswordRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        new_password:
          type: string
        confirm_password:
          type: string
      required:
      - confirm_password
      - email
      - new_password
      - username
    ForgotPasswordResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    FullTeamGenerateRequest:
      type: object
      properties:
        budget:
          type: number
          format: double
          maximum: 130.0
          minimum: 80.0
          default: 100.0
    MatchRequest:
      type: object
      properties:
        home_team_id:
          type: integer
          minimum: 1
        away_team_id:
          type: integer
          minimum: 1
        gw:
          type: integer
          minimum: 1
          nullable: true
      required:
      - away_team_id
      - home_team_id
    MePatchResponse:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
      required:
      - email
      - full_name
      - id
      - role
      - username
    MeResponse:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
      required:
      - email
      - full_name
      - id
      - role
      - username
    ModelAction:
      type: object
      properties:
        model_type:
          $ref: '#/components/schemas/ModelTypeEnum'
      required:
      - model_type
    ModelTypeEnum:
      enum:
      - general
      - player_points
      - price_change
      - match_prediction
      - fdr
      - captaincy
      - transfer_suggestion
      - team_generation
      type: string
      description: |-
        * `general` - General
        * `player_points` - Player Points
        * `price_change` - Price Change
        * `match_prediction` - Match Prediction
        * `fdr` - Fixture Difficulty
        * `captaincy` - Captaincy
        * `transfer_suggestion` - Transfer Suggestion
        * `team_generation` - Team Generation
    PatchedMePatchRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
          format: email
        full_name:
          type: string
    PlayerPointsRequest:
      type: object
      properties:
        player_id:
          type: integer
          minimum: 1
        gameweek:
          type: integer
          minimum: 1
          nullable: true
      required:
      - player_id
    PositionEnum:
      enum:
      - GK
      - DEF
      - MID
      - FWD
      type: string
      description: |-
        * `GK` - GK
        * `DEF` - DEF
        * `MID` - MID
        * `FWD` - FWD
    PriceRequest:
      type: object
      properties:
        player_id:
          type: integer
          minimum: 1
      required:
      - player_id
    PromoteUserResponse:
      type: object
      properties:
        message:
          type: string
        id:
          type: integer
        username:
          type: string
        role:
          type: string
      required:
      - id
      - message
      - role
      - username
    RegisterRequest:
      type: object
      properties:
        full_name:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
      required:
      - email
      - password
      - username
    RegisterResponse:
      type: object
      properties:
        message:
          type: string
      required:
      - message
    RoleTokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    SuperAdminUsersListResponse:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
          format: email
        full_name:
          type: string
        role:
          type: string
        is_active:
          type: boolean
      required:
      - email
      - full_name
      - id
      - is_active
      - role
      - username
    TeamSlot:
      type: object
      properties:
        slot_id:
          type: string
        position:
          $ref: '#/components/schemas/PositionEnum'
        player_id:
          type: integer
          minimum: 1
      required:
      - player_id
      - position
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    TransferSuggestRequest:
      type: object
      properties:
        team_slots:
          type: array
          items:
            $ref: '#/components/schemas/TeamSlot'
        remaining_budget:
          type: number
          format: double
          minimum: 0
        free_transfers:
          type: integer
          maximum: 5
          minimum: 1
          default: 1
      required:
      - remaining_budget
      - team_slots
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
