openapi: 3.0.3
info:
  title: FPL Insight Engine API
  version: 1.0.0
  description: OpenAPI schema for FPL Insight Engine backend APIs.
paths:
  /api/admin/ml/preview/{id}/:
    get:
      operationId: admin_ml_preview_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/admin/ml/publish/{id}/:
    post:
      operationId: admin_ml_publish_create
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/admin/ml/retrain/:
    post:
      operationId: admin_ml_retrain_create
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelAction'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ModelAction'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ModelAction'
        required: true
      security:
      - jwtAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/admin/ml/rollback/:
    post:
      operationId: admin_ml_rollback_create
      tags:
      - admin
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelAction'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ModelAction'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ModelAction'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/admin/ml/workflow/:
    get:
      operationId: admin_ml_workflow_retrieve
      parameters:
      - in: query
        name: model_type
        schema:
          type: string
        description: Optional model type filter.
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/admin/users/:
    get:
      operationId: admin_users_list
      tags:
      - admin
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
