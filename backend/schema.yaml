      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/predictions/match-upcoming/:
    get:
      operationId: predictions_match_upcoming_retrieve
      tags:
      - predictions
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/predictions/player-points/:
    post:
      operationId: predictions_player_points_create
      tags:
      - predictions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlayerPointsRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PlayerPointsRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PlayerPointsRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/predictions/price/:
    post:
      operationId: predictions_price_create
      tags:
      - predictions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PriceRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PriceRequest'
        required: true
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                additionalProperties: {}
          description: ''
  /api/predictions/team/generate/:
    post:
      operationId: predictions_team_generate_create
      tags:
      - predictions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FullTeamGenerateRequest'
          application/x-www-form-urlencoded:
